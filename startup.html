<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow Your Startup - UdyamCircle</title>
  
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon.png?v=2">
<link rel="apple-touch-icon" href="assets/favicon.png?v=2">

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <a href="index.html" class="logo">
  <img src="assets/logo-full.png">
</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="partners.html">Partners</a>
    <a href="#">Network</a>
  </nav>

  <a href="index.html" class="btn small">Back</a>
</header>

<!-- HERO -->
<section class="hero startup">
  <div class="hero-text">
    <h1>Grow Your Startup</h1>
    <p>Connect with other startups, find support, and scale faster with UdyamCircle.</p>
  </div>

  <img src="assets/startup-bg.png" class="bg-pattern">
</section>

<!-- FORM -->
<section class="form-section">

  <div class="form-card">

    <h2>Join Startup Network 📈</h2>
    <p class="form-sub">Collaborate, grow, and unlock new opportunities</p>

    <form id="startupForm">

      <div class="form-group">
        <input type="text" name="name" required>
        <label>Your Name</label>
      </div>

      <div class="form-group">
        <input type="text" name="startup" required>
        <label>Startup Name</label>
      </div>

      <div class="form-group">
        <select name="stage" required>
          <option value=""></option>
          <option>Idea Stage</option>
          <option>Early Stage</option>
          <option>Growing</option>
          <option>Scaling</option>
        </select>
        <label>Startup Stage</label>
      </div>

      <div class="form-group">
        <input type="text" name="need" required>
        <label>What do you need? (Hiring / Tech / Growth)</label>
      </div>

      <!-- NEW (IMPORTANT) -->
      <div class="form-group">
        <input type="tel" name="phone" required>
        <label>Phone Number</label>
      </div>

      <div class="form-group">
        <input type="email" name="email" required>
        <label>Email Address</label>
      </div>

      <button type="submit" class="btn premium-btn" id="submitBtn">
        Join Network
      </button>

    </form>

  </div>

</section>

<!-- SUCCESS -->
<div id="successMessage" class="success-box" style="display:none;">
  <h2>✅ You're In!</h2>
  <p>We’ll connect you with relevant startups and opportunities.</p>
</div>

<!-- SCRIPT -->
<script>
document.getElementById("startupForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const phone = this.phone.value;

  // VALIDATION
  if (!/^[0-9]{10}$/.test(phone)) {
    alert("Enter valid 10-digit phone number");
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.innerText = "Submitting...";
  btn.disabled = true;

  const formData = new FormData();
  formData.append("type", "startup");
  formData.append("name", this.name.value);
  formData.append("startup", this.startup.value);
  formData.append("stage", this.stage.value);
  formData.append("need", this.need.value);
  formData.append("phone", this.phone.value);
  formData.append("email", this.email.value);

  fetch("https://script.google.com/macros/s/AKfycbwM5I0rYz6kvqwvaZ4ALUA1qiPd6xht_GmKg58cIuIWUohoFmqfPhtiosaFxCFPBzgJYg/exec", {
    method: "POST",
    body: formData
  })
  .then(() => {
    document.getElementById("startupForm").style.display = "none";
    document.getElementById("successMessage").style.display = "block";
  })
  .catch(() => {
    alert("Something went wrong. Try again.");
    btn.innerText = "Join Network";
    btn.disabled = false;
  });
});

lucide.createIcons();
</script>

</body>
</html>
