<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your Business - UdyamCircle</title>
  
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<header class="navbar">
  <a href="index.html" class="logo">
  <img src="assets/logo-full.png">
</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="#">How It Works</a>
    <a href="#">Services</a>
  </nav>

  <a href="index.html" class="btn small">Back</a>
</header>

<section class="form-section">

  <div class="form-card">

    <h2>Start Your Startup Journey 🚀</h2>
    <p class="form-sub">Tell us about your idea — we’ll help you launch</p>

    <form id="founderForm">

      <div class="form-group">
        <input type="text" name="name" required>
        <label>Your Name</label>
      </div>

      <div class="form-group">
        <input type="tel" name="phone" required>
        <label>Phone Number</label>
      </div>

      <div class="form-group">
        <input type="email" name="email" required>
        <label>Email Address</label>
      </div>

      <div class="form-group">
        <textarea name="idea" required></textarea>
        <label>Your Startup Idea</label>
      </div>

      <div class="form-group">
        <select name="stage" required>
          <option value=""></option>
          <option>Idea Stage</option>
          <option>Prototype</option>
          <option>Ready to Launch</option>
          <option>Already Selling</option>
        </select>
        <label>Stage</label>
      </div>

      <div class="form-group">
        <select name="budget" required>
          <option value=""></option>
          <option>Below ₹10,000</option>
          <option>₹10k – ₹50k</option>
          <option>₹50k – ₹1L</option>
          <option>₹1L+</option>
        </select>
        <label>Budget</label>
      </div>

      <button type="submit" class="btn premium-btn" id="submitBtn">
        Submit Application
      </button>

    </form>

  </div>

</section>

<div id="successMessage" class="success-box" style="display:none;">
  <h2>✅ Submitted Successfully!</h2>
  <p>We will contact you shortly.</p>
</div>

<!-- SCRIPT -->
<script>
document.getElementById("founderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const phone = this.phone.value;

  // VALIDATION
  if (!/^[0-9]{10}$/.test(phone)) {
    alert("Enter valid 10-digit phone number");
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.innerText = "Submitting...";
  btn.disabled = true;

  const formData = new FormData();
  formData.append("type", "founder");   // ✅ IMPORTANT
  formData.append("name", this.name.value);
  formData.append("phone", this.phone.value);
  formData.append("email", this.email.value);
  formData.append("idea", this.idea.value);
  formData.append("stage", this.stage.value);
  formData.append("budget", this.budget.value);

  fetch("https://script.google.com/macros/s/AKfycbwM5I0rYz6kvqwvaZ4ALUA1qiPd6xht_GmKg58cIuIWUohoFmqfPhtiosaFxCFPBzgJYg/exec", {
    method: "POST",
    body: formData
  })
  .then(() => {
    document.getElementById("founderForm").style.display = "none";
    document.getElementById("successMessage").style.display = "block";
  })
  .catch(() => {
    alert("Something went wrong.");
    btn.innerText = "Submit Application";
    btn.disabled = false;
  });
});

lucide.createIcons();
</script>

</body>
</html>
